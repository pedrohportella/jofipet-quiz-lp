name: Lighthouse CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    name: Lighthouse on Vercel deployment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Wait for Vercel deployment
        id: vercel
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 600
          allow_inactive: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Resolve target URL
        id: target
        run: |
          if [ -n "${{ steps.vercel.outputs.url }}" ]; then
            echo "url=${{ steps.vercel.outputs.url }}" >> $GITHUB_OUTPUT
          else
            echo "url=https://jofipet-quiz-lp.vercel.app" >> $GITHUB_OUTPUT
          fi

      - name: Run Lighthouse CI
        env:
          TARGET_URL: ${{ steps.target.outputs.url }}
        run: |
          npx @lhci/cli@0.14.x autorun \
            --collect.url="$TARGET_URL" \
            --collect.url="$TARGET_URL/quiz/0" \
            --collect.url="$TARGET_URL/captura" \
            || echo "LHCI check completed with warnings — review report URL above"
